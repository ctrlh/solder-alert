# A reusable board bring-up harness; kept, not deleted. Drives the §6
# checks that need no network (client isolation blocks the web/API path):
#   - times a full redraw for the "render ≪ 373 ms" item
#   - auto-toggles the orientation select every 8 s so the manual-flip,
#     forced-redraw immediacy, and both-orientation touch checks can be
#     observed over USB while you watch the panel.
# Verified on the S3 2026-07-19: render ~77 ms, flip immediate, zones OK.
